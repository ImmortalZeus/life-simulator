<text id="You play as a young fresh graduate who must manage life after university. Each round represents one year, and you will make decisions about work, spending, lifestyle, and investment." fill="white" style="white-space: pre" xml:space="preserve" font-family="Roboto" font-size="20" letter-spacing="0em"><tspan x="105" y="302.336">You </tspan><tspan x="145.919" y="302.336">play </tspan><tspan x="189.319" y="302.336">as </tspan><tspan x="217.621" y="302.336">a </tspan><tspan x="235.591" y="302.336">young </tspan><tspan x="296.745" y="302.336">fresh </tspan><tspan x="349.344" y="302.336">graduate </tspan><tspan x="435.283" y="302.336">who </tspan><tspan x="479.835" y="302.336">must </tspan><tspan x="532.375" y="302.336">manage </tspan><tspan x="611.654" y="302.336">life </tspan><tspan x="645.796" y="302.336">after </tspan><tspan x="694.645" y="302.336">university. </tspan><tspan x="105" y="325.336">Each </tspan><tspan x="156.798" y="325.336">round </tspan><tspan x="216.233" y="325.336">represents </tspan><tspan x="318.813" y="325.336">one </tspan><tspan x="359.947" y="325.336">year, </tspan><tspan x="408.386" y="325.336">and </tspan><tspan x="449.676" y="325.336">you </tspan><tspan x="489.522" y="325.336">will </tspan><tspan x="527.218" y="325.336">make </tspan><tspan x="584.251" y="325.336">decisions </tspan><tspan x="677.534" y="325.336">about </tspan><tspan x="736.695" y="325.336">work, </tspan><tspan x="105" y="348.336">spending, </tspan><tspan x="195.566" y="348.336">lifestyle, </tspan><tspan x="273.34" y="348.336">and </tspan><tspan x="311.523" y="348.336">investment.</tspan></text>
<text id="At the end of each round, you will receive a summary of your income, expenses, investment portfolio, net worth, and life indicators. Use this feedback to adjust your strategy in the next round and try to reach the best life balance by the end of the game." fill="white" style="white-space: pre" xml:space="preserve" font-family="Roboto" font-size="20" letter-spacing="0em"><tspan x="105" y="745.336">At </tspan><tspan x="134.869" y="745.336">the </tspan><tspan x="173.468" y="745.336">end </tspan><tspan x="216.853" y="745.336">of </tspan><tspan x="245.648" y="745.336">each </tspan><tspan x="299.052" y="745.336">round, </tspan><tspan x="364.8" y="745.336">you </tspan><tspan x="407.013" y="745.336">will </tspan><tspan x="447.077" y="745.336">receive </tspan><tspan x="520.833" y="745.336">a </tspan><tspan x="542.147" y="745.336">summary </tspan><tspan x="636.332" y="745.336">of </tspan><tspan x="665.127" y="745.336">your </tspan><tspan x="714.117" y="745.336">income, </tspan><tspan x="105" y="768.336">expenses, </tspan><tspan x="205.618" y="768.336">investment </tspan><tspan x="316.314" y="768.336">portfolio, </tspan><tspan x="408.182" y="768.336">net </tspan><tspan x="448.371" y="768.336">worth, </tspan><tspan x="515.571" y="768.336">and </tspan><tspan x="560.779" y="768.336">life </tspan><tspan x="599.815" y="768.336">indicators. </tspan><tspan x="705.355" y="768.336">Use </tspan><tspan x="751.246" y="768.336">this </tspan><tspan x="105" y="791.336">feedback </tspan><tspan x="193.358" y="791.336">to </tspan><tspan x="217.536" y="791.336">adjust </tspan><tspan x="278.823" y="791.336">your </tspan><tspan x="323.802" y="791.336">strategy </tspan><tspan x="402.218" y="791.336">in </tspan><tspan x="424.56" y="791.336">the </tspan><tspan x="459.148" y="791.336">next </tspan><tspan x="503.698" y="791.336">round </tspan><tspan x="561.489" y="791.336">and </tspan><tspan x="601.136" y="791.336">try </tspan><tspan x="630.528" y="791.336">to </tspan><tspan x="654.706" y="791.336">reach </tspan><tspan x="710.701" y="791.336">the </tspan><tspan x="745.289" y="791.336">best </tspan><tspan x="105" y="814.336">life </tspan><tspan x="137.012" y="814.336">balance </tspan><tspan x="211.953" y="814.336">by </tspan><tspan x="237.52" y="814.336">the </tspan><tspan x="270.645" y="814.336">end </tspan><tspan x="308.555" y="814.336">of </tspan><tspan x="331.875" y="814.336">the </tspan><tspan x="365" y="814.336">game.</tspan></text>
<text id="Every decision affects your money, physical health, and mental health. Working overtime may increase your income, but it can reduce your well-being. Spending more on experiences may improve your life balance, but it can slow down your financial growth." fill="white" style="white-space: pre" xml:space="preserve" font-family="Roboto" font-size="20" letter-spacing="0em"><tspan x="105" y="518.336">Every </tspan><tspan x="164.446" y="518.336">decision </tspan><tspan x="251.06" y="518.336">affects </tspan><tspan x="325.292" y="518.336">your </tspan><tspan x="375.578" y="518.336">money, </tspan><tspan x="450.18" y="518.336">physical </tspan><tspan x="535.036" y="518.336">health, </tspan><tspan x="605.635" y="518.336">and </tspan><tspan x="650.589" y="518.336">mental </tspan><tspan x="723.805" y="518.336">health. </tspan><tspan x="105" y="541.336">Working </tspan><tspan x="186.433" y="541.336">overtime </tspan><tspan x="273.197" y="541.336">may </tspan><tspan x="319.454" y="541.336">increase </tspan><tspan x="403.367" y="541.336">your </tspan><tspan x="450.424" y="541.336">income, </tspan><tspan x="528.81" y="541.336">but </tspan><tspan x="566.121" y="541.336">it </tspan><tspan x="586.031" y="541.336">can </tspan><tspan x="626.936" y="541.336">reduce </tspan><tspan x="696.044" y="541.336">your </tspan><tspan x="743.102" y="541.336">well-</tspan><tspan x="105" y="564.336">being. </tspan><tspan x="166.23" y="564.336">Spending </tspan><tspan x="256.406" y="564.336">more </tspan><tspan x="309.53" y="564.336">on </tspan><tspan x="338.963" y="564.336">experiences </tspan><tspan x="453.006" y="564.336">may </tspan><tspan x="497.732" y="564.336">improve </tspan><tspan x="576.365" y="564.336">your </tspan><tspan x="621.892" y="564.336">life </tspan><tspan x="655.915" y="564.336">balance, </tspan><tspan x="736.813" y="564.336">but </tspan><tspan x="772.594" y="564.336">it </tspan><tspan x="105" y="587.336">can </tspan><tspan x="142.363" y="587.336">slow </tspan><tspan x="188.965" y="587.336">down </tspan><tspan x="242.715" y="587.336">your </tspan><tspan x="286.23" y="587.336">financial </tspan><tspan x="366.348" y="587.336">growth.</tspan></text>
